name: Collect public mobility data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Collect public data
        env:
          PUBLIC_DATA_SERVICE_KEY: ${{ secrets.PUBLIC_DATA_SERVICE_KEY }}
        run: node scripts/collect-public-data.mjs
      - name: Commit collected snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update public mobility data snapshot"
          file_pattern: public-data/latest.json
